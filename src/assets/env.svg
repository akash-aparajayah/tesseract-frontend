<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 550" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09203F" />
      <stop offset="100%" stop-color="#1e3c72" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE00" />
      <stop offset="50%" stop-color="#00F2FEFF" />
      <stop offset="100%" stop-color="#00F2FE00" />
    </linearGradient>

    <style>
      /* --- Pulse the central connection dot --- */
      @keyframes corePulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
      }
      .core-dot {
        animation: corePulse 2s ease-in-out infinite;
        transform-origin: 250px 280px;
      }

      /* --- Pulse the outer circuit ring --- */
      @keyframes ringPulse {
        0%, 100% { stroke-opacity: 0.8; stroke-width: 3; }
        50% { stroke-opacity: 0.4; stroke-width: 4; }
      }
      .circuit-ring {
        animation: ringPulse 3s ease-in-out infinite;
      }

      /* --- Trace the padlock arch --- */
      @keyframes archDraw {
        to { stroke-dashoffset: 0; }
      }
      .padlock-arch {
        stroke-dasharray: 600; /* Approximate length of arch */
        stroke-dashoffset: 600;
        animation: archDraw 1.5s ease-out forwards;
      }

      /* --- Initial Fade and Rise of Shield --- */
      @keyframes shieldRise {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .shield-body {
        animation: shieldRise 1s ease-out forwards;
        transform-origin: 250px 310px;
      }
      
      /* --- Fade in text last --- */
      @keyframes textFade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .brand-text {
        animation: textFade 0.5s ease-out 1s forwards; /* Delay to let logo load first */
      }
    </style>
  </defs>

  <path class="padlock-arch" d="M 170 180 C 170 80 330 80 330 180" 
        fill="none" stroke="url(#brandGradient)" stroke-width="24" stroke-linecap="round"/>

  <path class="shield-body" d="M 250 140 L 390 180 L 390 320 C 390 410 270 470 250 480 C 230 470 110 410 110 320 L 110 180 Z" 
        fill="url(#darkGradient)" stroke="url(#brandGradient)" stroke-width="4"/>

  <circle class="circuit-ring" cx="250" cy="280" r="45" fill="none" stroke="#00F2FE" stroke-width="3" stroke-dasharray="10,5" opacity="0.8" />
  
  <circle class="core-dot" cx="250" cy="280" r="20" fill="#00F2FE" />
  
  <path d="M 250 300 L 250 335" stroke="#00F2FE" stroke-width="8" stroke-linecap="round" />

  <text class="brand-text" x="250" y="540" font-family="Arial, sans-serif" font-size="65" font-weight="bold" text-anchor="middle" opacity="0">
    <tspan fill="#09203F">Env</tspan><tspan fill="#4FACFE">Lock</tspan>
  </text>
</svg>
